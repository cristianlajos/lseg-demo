template:
  name: deploy-k8s
  identifier: deployk8s
  versionLabel: 1.0.0
  type: Stage
  projectIdentifier: crs_sandbox
  orgIdentifier: DOPS_Labs
  tags: {}
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      environment:
        environmentRef: <+input>
        deployToAll: false
        environmentInputs: <+input>
        serviceOverrideInputs: <+input>
        infrastructureDefinitions: <+input>
      service:
        serviceRef: <+input>
        serviceInputs: <+input>
      execution:
        steps:
          - step:
              name: Rollout Deployment
              identifier: rolloutDeployment
              type: K8sRollingDeploy
              timeout: 10m
              spec:
                skipDryRun: false
                pruningEnabled: false
          - step:
              type: Http
              name: health-check
              identifier: healthcheck
              spec:
                url: http://harness-demo-app.<+env.name>/health
                method: GET
                headers: []
                inputVariables: []
                outputVariables: []
                assertion: <+httpResponseCode> == 200
              timeout: 30s
        rollbackSteps:
          - step:
              name: Rollback Rollout Deployment
              identifier: rollbackRolloutDeployment
              type: K8sRollingRollback
              timeout: 10m
              spec:
                pruningEnabled: false
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: StageRollback
