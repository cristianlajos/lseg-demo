pipeline:
  name: lseg-demo
  identifier: lsegdemo
  projectIdentifier: crs_sandbox
  orgIdentifier: DOPS_Labs
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: crsgithubconnector
        repoName: lseg-demo
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        template:
          templateRef: buildstandard
          versionLabel: 1.0.0
    - stage:
        name: Test
        identifier: Test
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8sconnector
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - parallel:
                  - step:
                      type: Run
                      name: unit-tests
                      identifier: unit_tests
                      spec:
                        connectorRef: cristianlajos
                        image: python:3.12-slim
                        shell: Sh
                        command: |
                          pip install pytest flask --quiet
                          cat > test_app.py << 'EOF'
                          from app import app
                          def test_home():
                              client = app.test_client()
                              response = client.get("/")
                              assert response.status_code == 200
                          def test_health():
                              client = app.test_client()
                              response = client.get("/health")
                              assert response.status_code == 200
                          EOF
                          pytest test_app.py -v
                  - step:
                      type: Run
                      name: lint
                      identifier: lint
                      spec:
                        connectorRef: cristianlajos
                        image: randomimage:12
                        shell: Sh
                        command: |-
                          pip install flake8 --quiet
                          flake8 app.py --max-line-length=100 --statistics
                          echo "Lint passed."
                  - step:
                      type: Run
                      name: security-scan
                      identifier: security_scan
                      spec:
                        connectorRef: cristianlajos
                        image: python:3.12-slim
                        shell: Sh
                        command: |
                          # Mock security scan — simulates finding vulnerabilities
                          # Set VULN_COUNT to 3 to trigger the Teams notification
                          # Change to 0 on a clean run to show the conditional NOT firing
                          echo "Running security scan..."
                          echo "Scanning image: cristianlajos/harness-demo-app"
                          echo "Found 3 vulnerabilities (2 medium, 1 high)"
                          export VULN_COUNT=3
                          echo "VULN_COUNT=$VULN_COUNT"
                        envVariables:
                          VULN_COUNT: "3"
                        outputVariables:
                          - name: VULN_COUNT
              - step:
                  type: Run
                  name: notify-teams
                  identifier: notify_teams
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.security_scan.output.outputVariables.VULN_COUNT> > 0
                  spec:
                    connectorRef: cristianlajos
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      pip install requests --quiet
                      python3 << 'EOF'
                      import requests, json, os

                      webhook_url = os.environ["TEAMS_WEBHOOK_URL"]
                      vuln_count = os.environ["VULN_COUNT"]
                      pipeline_name = os.environ["PIPELINE_NAME"]
                      triggered_by = os.environ["TRIGGERED_BY"]
                      build_number = os.environ["BUILD_NUMBER"]

                      payload = {
                        "type": "message",
                        "attachments": [
                          {
                            "contentType": "application/vnd.microsoft.card.adaptive",
                            "content": {
                              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                              "type": "AdaptiveCard",
                              "version": "1.4",
                              "body": [
                                {
                                  "type": "TextBlock",
                                  "text": "🚨 Security Scan Alert",
                                  "weight": "Bolder",
                                  "size": "Medium",
                                  "color": "Attention"
                                },
                                {
                                  "type": "FactSet",
                                  "facts": [
                                    {"title": "Pipeline", "value": pipeline_name},
                                    {"title": "Build", "value": f"#{build_number}"},
                                    {"title": "Triggered by", "value": triggered_by},
                                    {"title": "Vulnerabilities found", "value": vuln_count},
                                    {"title": "Action required", "value": "Review before promoting to production"}
                                  ]
                                }
                              ]
                            }
                          }
                        ]
                      }

                      response = requests.post(webhook_url, json=payload)
                      print(f"Teams notification sent — status: {response.status_code}")
                      EOF
                    envVariables:
                      TEAMS_WEBHOOK_URL: <+secrets.getValue("TEAMS_WEBHOOK_URL")>
                      VULN_COUNT: <+execution.steps.security_scan.output.outputVariables.VULN_COUNT>
                      PIPELINE_NAME: <+pipeline.name>
                      TRIGGERED_BY: <+pipeline.triggeredBy.name>
                      BUILD_NUMBER: <+pipeline.sequenceId>
    - stage:
        name: Deploy Staging
        identifier: Deploy_Staging
        tags: {}
        template:
          templateRef: deployk8s
          versionLabel: 1.0.0
          templateInputs:
            type: Deployment
            spec:
              environment:
                environmentRef: <+input>
                environmentInputs: <+input>
                serviceOverrideInputs: <+input>
                infrastructureDefinitions: <+input>
              service:
                serviceRef: <+input>
                serviceInputs: <+input>
    - stage:
        name: Approval
        identifier: Approval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Promote to Production
                  identifier: Promote_to_Production
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: Review staging deployment before promoting to production
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - _project_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
    - stage:
        name: Deploy Production
        identifier: Deploy_Production
        tags: {}
        template:
          templateRef: deployk8s
          versionLabel: 1.0.0
          templateInputs:
            type: Deployment
            spec:
              environment:
                environmentRef: <+input>
                environmentInputs: <+input>
                serviceOverrideInputs: <+input>
                infrastructureDefinitions: <+input>
              service:
                serviceRef: <+input>
                serviceInputs: <+input>
