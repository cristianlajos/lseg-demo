inputSet:
  name: demo_input_set
  tags: {}
  identifier: demo_input_set
  orgIdentifier: DOPS_Labs
  projectIdentifier: crs_sandbox
  pipeline:
    identifier: lsegdemo
    properties:
      ci:
        codebase:
          build:
            type: branch
            spec:
              branch: master
    stages:
      - stage:
          identifier: Deploy_Staging
          template:
            templateInputs:
              type: Deployment
              spec:
                environment:
                  environmentRef: staging
                  infrastructureDefinitions:
                    - identifier: staginginfra
                service:
                  serviceRef: harnessdemoapp
      - stage:
          identifier: Deploy_Production
          template:
            templateInputs:
              type: Deployment
              spec:
                environment:
                  environmentRef: production
                  infrastructureDefinitions:
                    - identifier: productioninfra
                service:
                  serviceRef: harnessdemoappproduction
